name: Build TWRP 11.0 for Teclast M20 (MT6797)

on:
  workflow_dispatch:

jobs:
  build-twrp:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget curl unzip python3 python3-pip bc lz4 xz-utils brotli cpio gperf libxml2-utils

      - name: Setup & Unpack with Magiskboot
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install twrpdtgen
          
          # 1. 安装基础工具
          sudo apt-get update
          sudo apt-get install -y cpio gzip zlib1g-dev liblz4-tool unzip
          
          # 2. 清理旧文件
          rm -f magisk.apk libmagiskboot.so magiskboot
          
          # 3. 下载 Magisk 的二进制工具
          wget https://github.com/topjohnwu/Magisk/releases/download/v26.1/Magisk-v26.1.apk -O magisk.apk
          
          # 4. 提取 x86_64 版本的 magiskboot
          unzip magisk.apk 'lib/x86_64/libmagiskboot.so'
          
          # 5. 重命名并赋予执行权限
          mv lib/x86_64/libmagiskboot.so ./magiskboot
          chmod +x ./magiskboot
          
          # 6. 执行解包，并强制忽略非零退出码 (GitHub误报)
          echo "🚀 正在解包 boot.img ..."
          ./magiskboot unpack boot.img || true
          
          # 7. 验证解包结果
          if [ -f "kernel" ] || [ -f "ramdisk.cpio" ]; then
            echo "✅ 恭喜！boot.img 解包成功！"
            ls -la | grep -E "(kernel|ramdisk|dtb)"
          else
            echo "❌ 解包失败，请检查 boot.img 是否损坏"
            exit 1
          fi

      - name: Repack Clean Image & Generate Device Tree
        run: |
          # 1. 使用 magiskboot 将刚刚解包的文件重新打包成一个干净的镜像
          # 这样能完美保留原厂的 base, pagesize, offset 等所有底层参数
          echo "🚀 正在使用 magiskboot 重新打包一个干净的镜像用于生成设备树..."
          ./magiskboot repack boot.img clean_boot.img || true
          
          # 检查是否成功生成了 clean_boot.img
          if [ ! -f "clean_boot.img" ]; then
            echo "❌ 重新打包失败，请检查 magiskboot 解包的文件是否完整"
            exit 1
          fi
          echo "✅ 干净镜像 clean_boot.img 打包成功！"
          ls -la clean_boot.img

          # 2. 使用这个干净的镜像来生成设备树
          echo "🌳 正在调用 twrpdtgen 生成设备树..."
          python3 -m twrpdtgen clean_boot.img -o device_tree
          echo "✅ 设备树生成完成！"
          ls -la device_tree

      - name: Customize Device Tree
        run: |
          DT="device_tree"
          # 如果 twrpdtgen 输出结构变了，这里做兼容
          if [ -d "$DT/output" ]; then
            mv $DT/output/*/* $DT/ 2>/dev/null || true
          fi
          
          # 尝试从解包出的 ramdisk 中提取代号，如果失败则使用默认值
          CODENAME=$(find $DT -name "default.prop" -exec grep "ro.product.device" {} + 2>/dev/null | head -n1 | cut -d= -f2 | tr -cd '[:alnum:]._-' || echo "m20_mt6797")
          
          # 创建或覆盖 BoardConfig.mk
          cat > $DT/BoardConfig.mk << EOF
          DEVICE_PATH := \$(LOCAL_PATH)

          PRODUCT_BRAND := Teclast
          PRODUCT_DEVICE := $CODENAME
          PRODUCT_NAME := twrp_$CODENAME
          PRODUCT_MODEL := Teclast M20 4G
          PRODUCT_MANUFACTURER := Teclast

          TARGET_ARCH := arm64
          TARGET_ARCH_VARIANT := armv8-a
          TARGET_CPU_ABI := arm64-v8a
          TARGET_CPU_VARIANT := cortex-a72

          TARGET_BOARD_PLATFORM := mt6797
          TARGET_BOOTLOADER_BOARD_NAME := mt6797

          TARGET_SCREEN_WIDTH := 2560
          TARGET_SCREEN_HEIGHT := 1600

          TW_THEME := portrait_hdpi
          RECOVERY_SDCARD_ON_DATA := true
          TW_EXCLUDE_SUPERSU := true
          TW_INCLUDE_CRYPTO := true
          TW_INCLUDE_NTFS_3G := true
          TW_INCLUDE_FUSE_EXFAT := true
          TW_HAS_MTP := true
          TW_NO_REBOOT_BOOTLOADER := true
          TW_USE_TOOLBOX := true
          TW_NO_LEGACY_PROPS := true
          TW_INCLUDE_FASTBOOTD := true

          BOARD_HAS_NO_REAL_SDCARD := false
          TW_BRIGHTNESS_PATH := /sys/class/leds/lcd-backlight/brightness
          TW_MAX_BRIGHTNESS := 255
          EOF

          echo "✅ 设备树自定义完成 (CODENAME: $CODENAME)"

      - name: Automatic fstab Repair
        run: |
          DT="device_tree"
          # 查找 fstab 文件，通常在 device_tree/ 或 device_tree/ramdisk/etc/
          FSTAB_PATH=$(find $DT -type f -name "recovery.fstab" -o -name "fstab.*" | head -n1)
          
          if [ -n "$FSTAB_PATH" ]; then
            echo "🔧 正在修复 fstab: $FSTAB_PATH"
            # 避免重复添加，先检查是否存在
            if ! grep -q "/data" "$FSTAB_PATH"; then
              cat >> "$FSTAB_PATH" << 'EOF'

          # Auto-added for Teclast M20 (MT6797)
          /system_root    ext4    /dev/block/by-name/system    flags=backup=1
          /vendor         ext4    /dev/block/by-name/vendor    flags=backup=1
          /data           f2fs    /dev/block/by-name/userdata  flags=backup=1,encryptable=footer
          /cache          ext4    /dev/block/by-name/cache     flags=backup=1
          /boot           emmc    /dev/block/by-name/boot
          /recovery       emmc    /dev/block/by-name/recovery
          EOF
              echo "✅ fstab 修复完成"
            else
              echo "ℹ️  fstab 已包含 data 分区，跳过修复"
            fi
          else
            echo "❌ 未找到 fstab 文件，请手动检查"
          fi

      - name: Sync TWRP 11.0 & Build
        run: |
          # 确保目录存在
          mkdir -p twrp_build
          cd twrp_build
          
          # 初始化仓库
          # 注意：twrp-11.0 分支可能不存在，TWRP 11.0 通常对应 android-11.0 标签或分支
          # 如果失败，可以尝试 twrp-12.1 或其他相近版本
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-11.0 --depth=1 || {
            echo "⚠️  twrp-11.0 分支克隆失败，尝试使用 twrp-12.1...";
            repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1 --depth=1;
          }
          
          # 同步代码
          repo sync -c --force-sync -j3 --no-clone-bundle --no-tags || echo "部分同步失败，继续..."
          
          # 创建设备树目录并复制
          CODENAME=$(grep "PRODUCT_DEVICE" ../device_tree/BoardConfig.mk | cut -d= -f2)
          mkdir -p device/teclast/$CODENAME
          cp -r ../device_tree/* device/teclast/$CODENAME/ 2>/dev/null || true
          
          # 准备编译环境
          . build/envsetup.sh
          lunch twrp_$CODENAME-eng || lunch twrp_generic-eng
          mka recoveryimage -j2 || echo "⚠️ 编译结束，请查看日志"

      - name: Upload TWRP Image
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-11.0-Teclast-M20-MT6797
          path: twrp_build/out/target/product/*/recovery.img
          if-no-files-found: warn
