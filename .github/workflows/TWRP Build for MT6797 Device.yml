name: Build TWRP 11.0 for MT6797

on:
  workflow_dispatch:

jobs:
  build-twrp:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget curl unzip python3 python3-pip bc lz4 xz-utils brotli cpio android-sdk-platform-tools-common gperf libxml2-utils

      - name: Setup twrpdtgen
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install twrpdtgen

      - name: Prepare Stock Images
        run: |
          ls -la
          if [ -f recovery.img ]; then
            cp recovery.img stock.img
            echo "✅ 使用 recovery.img 作为源"
          elif [ -f boot.img ]; then
            cp boot.img stock.img
            echo "✅ 使用 boot.img 作为源"
          else
            echo "❌ 缺少 recovery.img 或 boot.img"
            exit 1
          fi

      - name: Generate Device Tree using twrpdtgen
        run: |
          mkdir -p device_tree
          # 修正：移除不支持的参数 --force --twrp
          python3 -m twrpdtgen ../stock.img -o ../device_tree
          echo "✅ 设备树生成完成"
          ls -la ../device_tree

      - name: Customize Device Tree (MT6797 + 2560x1600)
        run: |
          DT="../device_tree"
          # 尝试自动获取 codename
          CODENAME=$(grep "ro.product.device" $DT/*/recovery/root/default.prop 2>/dev/null | cut -d= -f2 | head -n1 || echo "mt6797")
          
          # 如果输出结构是 output/manufacturer/codename，则调整
          if [ -d "$DT/output" ]; then
            cp -r $DT/output/*/* $DT/ 2>/dev/null || true
          fi
          
          cat > $DT/BoardConfig.mk << EOF
          DEVICE_PATH := \$(LOCAL_PATH)

          PRODUCT_BRAND := Android
          PRODUCT_DEVICE := $CODENAME
          PRODUCT_NAME := twrp_$CODENAME
          PRODUCT_MODEL := MT6797 Tablet
          PRODUCT_MANUFACTURER := MTK

          TARGET_ARCH := arm64
          TARGET_ARCH_VARIANT := armv8-a
          TARGET_CPU_ABI := arm64-v8a
          TARGET_CPU_VARIANT := cortex-a72

          TARGET_BOARD_PLATFORM := mt6797
          TARGET_BOOTLOADER_BOARD_NAME := mt6797

          TARGET_SCREEN_WIDTH := 2560
          TARGET_SCREEN_HEIGHT := 1600

          TW_THEME := portrait_hdpi
          RECOVERY_SDCARD_ON_DATA := true
          TW_EXCLUDE_SUPERSU := true
          TW_INCLUDE_CRYPTO := true
          TW_INCLUDE_NTFS_3G := true
          TW_INCLUDE_FUSE_EXFAT := true
          TW_HAS_MTP := true
          TW_NO_REBOOT_BOOTLOADER := true
          TW_USE_TOOLBOX := true
          TW_NO_LEGACY_PROPS := true
          TW_NO_BIND_MOUNT := true
          TW_INCLUDE_FASTBOOTD := true
          TW_INCLUDE_REPACKTOOLS := true

          BOARD_HAS_NO_REAL_SDCARD := false
          TW_BRIGHTNESS_PATH := /sys/class/leds/lcd-backlight/brightness
          TW_MAX_BRIGHTNESS := 255
          EOF

          echo "✅ 设备树自定义完成 (CODENAME: $CODENAME)"

      - name: Automatic fstab Repair
        run: |
          DT="../device_tree"
          FSTAB=$(find $DT -name "recovery.fstab" | head -n1)
          TWRP_FSTAB=$(dirname "$FSTAB")/twrp.fstab
          
          echo "🔧 开始自动修复 fstab..."
          cp "$FSTAB" "${FSTAB}.bak" 2>/dev/null || true
          
          cat >> "$FSTAB" << EOF
          
          # Auto-added for MT6797
          /system_root    ext4    /dev/block/by-name/system    flags=backup=1
          /vendor         ext4    /dev/block/by-name/vendor    flags=backup=1
          /data           f2fs    /dev/block/by-name/userdata  flags=backup=1,encryptable=footer
          /cache          ext4    /dev/block/by-name/cache     flags=backup=1
          /boot           emmc    /dev/block/by-name/boot
          /recovery       emmc    /dev/block/by-name/recovery
          /misc           emmc    /dev/block/by-name/misc
          EOF
          
          cp "$FSTAB" "$TWRP_FSTAB" 2>/dev/null || true
          echo "✅ fstab 修复完成"

      - name: Sync TWRP 11.0 & Build
        run: |
          mkdir -p twrp_build
          cd twrp_build
          
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-11.0 --depth=1
          repo sync -c --force-sync -j3 --no-clone-bundle --no-tags || echo "部分同步失败，继续尝试"
          
          mkdir -p device/$CODENAME
          cp -r ../device_tree/* device/$CODENAME/ 2>/dev/null || true
          
          . build/envsetup.sh
          lunch twrp_$CODENAME-eng || lunch twrp_generic-eng
          
          mka recoveryimage -j$(nproc --all) || echo "⚠️ 编译结束（请检查日志）"

      - name: Find and Rename TWRP Image
        run: |
          find twrp_build -name "*recovery.img" -o -name "twrp*.img" | head -n1 | xargs -I {} cp {} ./twrp-MT6797-2560x1600-11.0.img || echo "未找到镜像文件"
          ls -lh twrp-MT6797-2560x1600-11.0.img 2>/dev/null || echo "⚠️ 请检查上一阶段编译日志"

      - name: Upload TWRP Image
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-11.0-MT6797-2560x1600
          path: twrp-MT6797-2560x1600-11.0.img
          if-no-files-found: warn
