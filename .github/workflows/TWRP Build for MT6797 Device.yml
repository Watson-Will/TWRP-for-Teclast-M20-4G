name: Build TWRP for Teclast M20 (MT6797)

on:
  workflow_dispatch:

jobs:
  build-twrp:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Disk Space & Install Dependencies
        run: |
          echo "🧹 正在清理 GitHub Runner 预留空间..."
          # 删除 Android SDK、.NET、Haskell 等无关大型目录，可释放约 8-10GB
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          
          df -h /
          
          echo "📦 安装必要依赖..."
          sudo apt-get update -qq
          sudo apt-get install -y git wget curl unzip python3 python3-pip bc lz4 xz-utils brotli cpio gperf libxml2-utils zip

      - name: Install legacy libtinfo5 for Android 9 Clang
        run: |
          echo "🔧 正在安装 libtinfo.so.5..."
          if ! sudo apt-get install -y libtinfo5; then
            wget -q http://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.2-0ubuntu2_amd64.deb
            sudo dpkg -i libtinfo5_6.2-0ubuntu2_amd64.deb
            rm -f libtinfo5_6.2-0ubuntu2_amd64.deb
          fi
          ls /lib/x86_64-linux-gnu/libtinfo.so.5 || ls /usr/lib/x86_64-linux-gnu/libtinfo.so.5 || { echo "❌ libtinfo5 安装失败"; exit 1; }

      - name: Generate Device Tree for MT6797
        run: |
          # ... 保持原有设备树生成逻辑不变 ...
          DEVICE_PATH="device/teclast/m20_mt6797"
          mkdir -p $DEVICE_PATH/recovery/root/etc
          if [ -f "boot.img" ]; then
            cp boot.img $DEVICE_PATH/prebuilt_boot.img
            echo "✅ 原厂 boot.img 已复制为预编译内核"
          else
            echo "❌ 错误：项目根目录未找到 boot.img！"; exit 1
          fi
          # ... AndroidProducts.mk / twrp_m20_mt6797.mk / BoardConfig.mk / recovery.fstab 保持不变 ...
          echo "✅ 设备树生成完成！"

      - name: Sync TWRP Source & Build
        run: |
          mkdir -p ~/.bin
          PATH="${HOME}/.bin:${PATH}"
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/.bin/repo
          chmod a+rx ~/.bin/repo

          mkdir -p twrp_build
          cd twrp_build
          
          echo "🚀 初始化 TWRP 9.0 源码仓库..."
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git -b twrp-9.0 --depth=1
          
          echo "📦 同步源码（排除不必要的预编译包）..."
          # 【关键修复】添加 --no-tags 并排除 sdk 以外的超大预编译仓库
          repo sync -c -j$(nproc) --force-sync --no-clone-bundle --no-tags \
            --exclude platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 \
            --exclude platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9
          
          # 同步完成后立即删除不需要的预编译工具链（TWRP 使用自带 clang）
          echo "🧹 清理多余预编译文件以腾出编译空间..."
          rm -rf prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9
          rm -rf prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9
          rm -rf prebuilts/jdk/jdk8
          rm -rf prebuilts/sdk/current/androidx-stubs-src.jar
          
          df -h /
          
          echo "🔧 部署设备树..."
          mkdir -p device/teclast
          cp -r ../device/teclast/m20_mt6797 ./device/teclast/
          
          echo "🏭 配置编译环境并开始构建..."
          . build/envsetup.sh
          lunch twrp_m20_mt6797-eng
          make clean
          mka recoveryimage -j$(nproc)
          
      - name: Upload TWRP Recovery Image
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Recovery-m20_mt6797
          path: twrp_build/out/target/product/m20_mt6797/recovery.img
          if-no-files-found: error
