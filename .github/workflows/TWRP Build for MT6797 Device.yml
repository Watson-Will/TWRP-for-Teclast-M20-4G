name: Build TWRP for Teclast M20 (MT6797)

on:
  workflow_dispatch:

jobs:
  build-twrp:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget curl unzip python3 python3-pip bc lz4 xz-utils brotli cpio gperf libxml2-utils

      - name: Setup & Unpack with Magiskboot
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install twrpdtgen
          
          sudo apt-get update
          sudo apt-get install -y cpio gzip zlib1g-dev liblz4-tool unzip
          
          rm -f magisk.apk libmagiskboot.so magiskboot
          
          wget https://github.com/topjohnwu/Magisk/releases/download/v26.1/Magisk-v26.1.apk -O magisk.apk
          
          unzip magisk.apk 'lib/x86_64/libmagiskboot.so'
          
          mv lib/x86_64/libmagiskboot.so ./magiskboot
          chmod +x ./magiskboot
          
          echo "🚀 正在解包 boot.img ..."
          ./magiskboot unpack boot.img || true
          
          if [ -f "kernel" ] || [ -f "ramdisk.cpio" ]; then
            echo "✅ 恭喜！boot.img 解包成功！"
            ls -la | grep -E "(kernel|ramdisk|dtb)"
          else
            echo "❌ 解包失败，请检查 boot.img 是否损坏"
            exit 1
          fi

      - name: Manually Generate Device Tree for MT6797
        run: |
          DEVICE_PATH="device/teclast/m20_mt6797"
          mkdir -p $DEVICE_PATH
          
          echo "🌳 正在手动生成 TWRP 设备树配置..."

          cat > $DEVICE_PATH/AndroidProducts.mk << 'EOF'
          PRODUCT_MAKEFILES := \
              $(LOCAL_DIR)/twrp_m20_mt6797.mk
          EOF

          # 【核心修复】将 vendor/twrp/config/common.mk 替换为 bootable/recovery/twrp.mk
          # 并添加 ALLOW_MISSING_DEPENDENCIES=true 防止 TWRP 9.0 严格依赖检查报错
          cat > $DEVICE_PATH/twrp_m20_mt6797.mk << 'EOF'
          $(call inherit-product, $(SRC_TARGET_DIR)/product/core_64_bit.mk)
          $(call inherit-product, $(SRC_TARGET_DIR)/product/base.mk)
          $(call inherit-product, bootable/recovery/twrp.mk)

          PRODUCT_DEVICE := m20_mt6797
          PRODUCT_NAME := twrp_m20_mt6797
          PRODUCT_BRAND := Teclast
          PRODUCT_MODEL := Teclast M20 4G
          PRODUCT_MANUFACTURER := Teclast

          # TWRP 9.0 必须声明允许缺失依赖，否则大量系统模块会报错
          ALLOW_MISSING_DEPENDENCIES := true

          PRODUCT_PACKAGES += \
              otapreopt_script \
              cppreopts.sh \
              update_engine \
              update_verifier \
              update_engine_sideload
          EOF

          cat > $DEVICE_PATH/BoardConfig.mk << 'EOF'
          DEVICE_PATH := device/teclast/m20_mt6797

          TARGET_ARCH := arm64
          TARGET_ARCH_VARIANT := armv8-a
          TARGET_CPU_ABI := arm64-v8a
          TARGET_CPU_ABI2 := 
          TARGET_CPU_VARIANT := generic
          TARGET_CPU_VARIANT_RUNTIME := cortex-a72

          TARGET_2ND_ARCH := arm
          TARGET_2ND_ARCH_VARIANT := armv8-a
          TARGET_2ND_CPU_ABI := armeabi-v7a
          TARGET_2ND_CPU_ABI2 := armeabi
          TARGET_2ND_CPU_VARIANT := generic
          TARGET_2ND_CPU_VARIANT_RUNTIME := cortex-a53

          TARGET_BOARD_PLATFORM := mt6797
          TARGET_BOOTLOADER_BOARD_NAME := mt6797
          TARGET_NO_BOOTLOADER := true

          BOARD_KERNEL_CMDLINE := bootopt=64S3,32N2,64N2
          BOARD_KERNEL_BASE := 0x40078000
          BOARD_KERNEL_PAGESIZE := 2048
          BOARD_KERNEL_OFFSET := 0x00008000
          BOARD_RAMDISK_OFFSET := 0x11a88000
          BOARD_KERNEL_TAGS_OFFSET := 0x07808000
          BOARD_MKBOOTIMG_ARGS := --kernel_offset $(BOARD_KERNEL_OFFSET) --ramdisk_offset $(BOARD_RAMDISK_OFFSET) --tags_offset $(BOARD_KERNEL_TAGS_OFFSET)

          BOARD_BOOTIMAGE_PARTITION_SIZE := 33554432
          BOARD_RECOVERYIMAGE_PARTITION_SIZE := 16777216
          BOARD_HAS_LARGE_FILESYSTEM := true
          BOARD_SYSTEMIMAGE_PARTITION_TYPE := ext4
          BOARD_USERDATAIMAGE_FILE_SYSTEM_TYPE := ext4

          TW_THEME := portrait_xxhdpi
          TARGET_SCREEN_HEIGHT := 2560
          TARGET_SCREEN_WIDTH := 1600
          TW_FRAMERATE := 60
          RECOVERY_SDCARD_ON_DATA := true
          TARGET_RECOVERY_PIXEL_FORMAT := "RGBX_8888"
          TW_BRIGHTNESS_PATH := "/sys/class/leds/lcd-backlight/brightness"
          TW_MAX_BRIGHTNESS := 255
          TW_DEFAULT_BRIGHTNESS := 120
          TW_USE_TOOLBOX := true
          TW_INCLUDE_NTFS_3G := true
          TW_INCLUDE_FUSE_EXFAT := true
          TW_EXCLUDE_SUPERSU := true
          TW_INCLUDE_CRYPTO := true
          TW_EXTRA_LANGUAGES := true
          TW_SCREEN_BLANK_ON_BOOT := true
          EOF

          mkdir -p $DEVICE_PATH/recovery/root/etc
          cat > $DEVICE_PATH/recovery/root/etc/recovery.fstab << 'EOF'
          /boot           emmc    /dev/block/by-name/boot           flags=backup=1
          /recovery       emmc    /dev/block/by-name/recovery       flags=backup=1
          /system         ext4    /dev/block/by-name/system         flags=backup=1
          /vendor         ext4    /dev/block/by-name/vendor         flags=backup=1
          /data           f2fs    /dev/block/by-name/userdata       flags=backup=1,encryptable=footer
          /cache          ext4    /dev/block/by-name/cache          flags=backup=1
          /sdcard         vfat    /dev/block/mmcblk1p1              flags=display="Micro SDcard";storage;wipeingui;removable
          /usb-otg        auto    /dev/block/sda1                   flags=display="USB-OTG";storage;wipeingui;removable
          EOF

          echo "✅ 手动设备树生成完成！目录结构如下："
          find $DEVICE_PATH -type f

      - name: Sync TWRP Source & Build
        run: |
          mkdir -p ~/.bin
          PATH="${HOME}/.bin:${PATH}"
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/.bin/repo
          chmod a+rx ~/.bin/repo

          mkdir -p twrp_build
          cd twrp_build
          
          echo "🚀 初始化 TWRP 9.0 (Android 9.0) 源码仓库..."
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git -b twrp-9.0 --depth=1
          
          echo "📦 同步源码..."
          repo sync -c -j1 --force-sync --no-clone-bundle --no-tags

          # 【修复】将 clean 移到部署文件之前，避免清理掉预编译内核
          echo "🧹 清理旧编译缓存..."
          make clean || true

          echo "🔧 部署设备树到源码目录..."
          mkdir -p device/teclast
          cp -r ../device/teclast/m20_mt6797 ./device/teclast/
          
          echo "📦 部署内核文件 zImage..."
          if [ ! -f "../zImage" ]; then
            echo "❌ 致命错误：在项目根目录未找到 zImage！请先在本地提取并上传 zImage 文件。"
            exit 1
          fi
          
          mkdir -p prebuilts/kernel/arm64
          cp ../zImage prebuilts/kernel/arm64/
          echo "✅ 成功部署内核文件！"
          ls -lh prebuilts/kernel/arm64/zImage

          echo "🔧 修正设备树中的依赖名称..."
          find device/teclast/m20_mt6797 -type f \( -name "*.mk" -o -name "*.bp" \) -exec sed -i 's/skia_deps/libskia/g' {} \;
          echo "✅ 已成功将设备树中的 skia_deps 替换为 libskia"

          echo "🏭 配置编译环境..."
          . build/envsetup.sh
          
          echo "🏗️  开始编译 TWRP 9.0..."
          lunch twrp_m20_mt6797-eng
          mka recoveryimage -j2
          
      - name: Upload TWRP Recovery Image
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Recovery-m20_mt6797
          path: twrp_build/out/target/product/m20_mt6797/recovery.img
          if-no-files-found: error
