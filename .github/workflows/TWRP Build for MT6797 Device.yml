name: Build TWRP 11.0 for Teclast M20 (MT6797)

on:
  workflow_dispatch:

jobs:
  build-twrp:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget curl unzip python3 python3-pip bc lz4 xz-utils brotli cpio gperf libxml2-utils

      - name: Setup twrpdtgen + AIK-Linux
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install twrpdtgen
          
          # 1. 克隆 AIK 仓库 (使用主分支，更稳定)
          git clone --depth=1 https://github.com/osm0sis/Android-Image-Kitchen.git AIK
          cd AIK
          
          # 2. 查找 unpackbootimg 工具的实际位置
          echo "🔍 正在搜索 unpackbootimg 工具..."
          find . -name "unpackbootimg*" -type f -executable 2>/dev/null
          
          # 3. 根据常见结构创建必要的目录软链接或移动文件
          # 情况 A: 如果工具在 bin/ 目录下 (扁平结构)
          if [ -f "bin/unpackbootimg" ]; then
            echo "🛠️ 检测到扁平结构，正在修复路径..."
            mkdir -p bin/linux/x86_64
            cp bin/unpackbootimg bin/linux/x86_64/
            cp bin/repackbootimg bin/linux/x86_64/ 2>/dev/null || true
          fi
          
          # 情况 B: 如果工具缺失，尝试使用 Python 版本 (如果存在)
          if [ ! -f "bin/linux/x86_64/unpackbootimg" ] && [ -f "unpackbootimg.py" ]; then
            echo "📦 使用 Python 版本作为替代..."
            mkdir -p bin/linux/x86_64
            cp unpackbootimg.py bin/linux/x86_64/unpackbootimg
            chmod +x bin/linux/x86_64/unpackbootimg
          fi
          
          # 4. 确保所有脚本可执行
          chmod +x *.sh bin/* 2>/dev/null || true
          
          # 5. 最终检查
          if [ ! -f "bin/linux/x86_64/unpackbootimg" ]; then
            echo "❌ 致命错误：无法定位或恢复 unpackbootimg 工具。"
            echo "当前 AIK/bin 目录结构："
            find . -path "*/bin/*" -type f
            exit 1
          fi
          
          echo "✅ AIK 环境准备就绪"
          cd ..

      - name: Prepare & Fix Stock Image (Android 8.0)
        run: |
          ls -la
          if [ -f recovery.img ]; then
            cp recovery.img stock.img
            echo "✅ 使用 recovery.img"
          elif [ -f boot.img ]; then
            cp boot.img stock.img
            echo "✅ 使用 boot.img"
          else
            echo "❌ 缺少 recovery.img 或 boot.img"
            exit 1
          fi

          cp stock.img AIK/
          cd AIK
          echo "正在解包 stock.img ..."
          ./unpackimg.sh stock.img --nosudo

          # 修复 twrpdtgen 报错
          if [ -f ramdisk/build.prop ]; then
            echo "ro.product.first_api_level=26" >> ramdisk/build.prop
            echo "ro.build.version.sdk=26" >> ramdisk/build.prop
            echo "ro.build.version.release=8.0" >> ramdisk/build.prop
            echo "✅ 已成功注入 Android 8.0 属性"
          fi

          ./repackimg.sh
          mv image-new.img ../fixed-stock.img
          cd ..

          ls -la fixed-stock.img

      - name: Generate Device Tree
        run: |
          mkdir -p device_tree
          python3 -m twrpdtgen fixed-stock.img -o device_tree
          echo "✅ 设备树生成完成"
          ls -la device_tree

      - name: Customize Device Tree
        run: |
          DT="device_tree"
          if [ -d "$DT/output" ]; then
            mv $DT/output/*/* $DT/ 2>/dev/null || true
          fi
          
          CODENAME=$(find $DT -name "default.prop" -exec grep "ro.product.device" {} + 2>/dev/null | head -n1 | cut -d= -f2 || echo "mt6797")
          
          cat > $DT/BoardConfig.mk << EOF
          DEVICE_PATH := \$(LOCAL_PATH)

          PRODUCT_BRAND := Teclast
          PRODUCT_DEVICE := $CODENAME
          PRODUCT_NAME := twrp_$CODENAME
          PRODUCT_MODEL := Teclast M20 4G
          PRODUCT_MANUFACTURER := Teclast

          TARGET_ARCH := arm64
          TARGET_ARCH_VARIANT := armv8-a
          TARGET_CPU_ABI := arm64-v8a
          TARGET_CPU_VARIANT := cortex-a72

          TARGET_BOARD_PLATFORM := mt6797
          TARGET_BOOTLOADER_BOARD_NAME := mt6797

          TARGET_SCREEN_WIDTH := 2560
          TARGET_SCREEN_HEIGHT := 1600

          TW_THEME := portrait_hdpi
          RECOVERY_SDCARD_ON_DATA := true
          TW_EXCLUDE_SUPERSU := true
          TW_INCLUDE_CRYPTO := true
          TW_INCLUDE_NTFS_3G := true
          TW_INCLUDE_FUSE_EXFAT := true
          TW_HAS_MTP := true
          TW_NO_REBOOT_BOOTLOADER := true
          TW_USE_TOOLBOX := true
          TW_NO_LEGACY_PROPS := true
          TW_INCLUDE_FASTBOOTD := true

          BOARD_HAS_NO_REAL_SDCARD := false
          TW_BRIGHTNESS_PATH := /sys/class/leds/lcd-backlight/brightness
          TW_MAX_BRIGHTNESS := 255
          EOF

          echo "✅ 设备树自定义完成 (CODENAME: $CODENAME)"

      - name: Automatic fstab Repair
        run: |
          DT="device_tree"
          FSTAB=$(find $DT -name "recovery.fstab" | head -n1)
          if [ -n "$FSTAB" ]; then
            cat >> "$FSTAB" << EOF
            
          # Auto-added for Teclast M20 (MT6797)
          /system_root    ext4    /dev/block/by-name/system    flags=backup=1
          /vendor         ext4    /dev/block/by-name/vendor    flags=backup=1
          /data           f2fs    /dev/block/by-name/userdata  flags=backup=1,encryptable=footer
          /cache          ext4    /dev/block/by-name/cache     flags=backup=1
          /boot           emmc    /dev/block/by-name/boot
          /recovery       emmc    /dev/block/by-name/recovery
          EOF
            echo "✅ fstab 修复完成"
          fi

      - name: Sync TWRP 11.0 & Build
        run: |
          mkdir -p twrp_build
          cd twrp_build
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-11.0 --depth=1
          repo sync -c --force-sync -j3 --no-clone-bundle --no-tags || echo "部分同步失败"
          
          mkdir -p device/$CODENAME
          cp -r ../device_tree/* device/$CODENAME/ 2>/dev/null || true
          
          . build/envsetup.sh
          lunch twrp_$CODENAME-eng || lunch twrp_generic-eng
          mka recoveryimage -j2 || echo "⚠️ 编译结束，请查看日志"

      - name: Upload TWRP Image
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-11.0-Teclast-M20-MT6797
          path: twrp_build/out/target/product/*/recovery.img
          if-no-files-found: warn
