name: Build TWRP for Teclast M20 (MT6797)

on:
  workflow_dispatch:

jobs:
  build-twrp:
    runs-on: ubuntu-22.04
    steps:
    - name: Maximize Build Space
      uses: easimon/maximize-build-space@v10
      with:
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'
        overprovision-lvm: 'true'

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies & Repo Tool
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y git wget curl unzip python2 python3 python3-pip bc lz4 xz-utils brotli cpio gperf libxml2-utils zip
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH
        git config --global user.name "TWRP Builder"
        git config --global user.email "builder@twrp.me"
        sudo ln -sf /usr/bin/python2 /usr/bin/python

    - name: Install Legacy ncurses & tinfo Libraries
      run: |
        if ! sudo apt-get install -y libncurses5 libtinfo5; then
          wget -q http://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.2-0ubuntu2_amd64.deb
          wget -q http://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libncurses5_6.2-0ubuntu2_amd64.deb
          sudo dpkg -i libtinfo5_6.2-0ubuntu2_amd64.deb libncurses5_6.2-0ubuntu2_amd64.deb
          rm -f *.deb
        fi

    - name: Setup JDK 8
      run: |
        sudo apt-get install -y openjdk-8-jdk
        sudo update-alternatives --set java /usr/lib/jvm/java-8-openjdk-amd64/jre/bin/java
        sudo update-alternatives --set javac /usr/lib/jvm/java-8-openjdk-amd64/bin/javac
        echo "JAVA_HOME=/usr/lib/jvm/java-8-openjdk-amd64" >> $GITHUB_ENV

    - name: Prepare LZMA Tools and Swap
      run: |
        sudo apt-get install -y xz-utils lzma
        sudo fallocate -l 4G /swapfile
        sudo chmod 600 /swapfile && sudo mkswap /swapfile && sudo swapon /swapfile
        free -h

    - name: Sync Source & Generate Device Tree & Build
      run: |
        set -e
        mkdir -p twrp_build && cd twrp_build

        repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git -b twrp-8.1 --depth=1
        repo sync -c -j$(nproc) --force-sync --no-clone-bundle --no-tags

        echo "🧹 安全清理..."
        rm -rf frameworks/ml external/chromium-webview external/ant-wireless
        rm -rf device/qcom/* device/generic/goldfish vendor/qcom/opensource/dataservices
        rm -rf hardware/qcom/audio hardware/qcom/camera hardware/qcom/display
        find . -path ./out -prune -o -type f \( -name "*.apk" -o -name "*.odex" \) -print | xargs -r rm -f

        # 🔥 第一步：精确定位 recoveryimage 目标的注册逻辑
        CORE_MAKEFILE="build/make/core/Makefile"
        [ ! -f "$CORE_MAKEFILE" ] && CORE_MAKEFILE="build/core/Makefile"

        echo "=== 搜索 Makefile 中所有 recoveryimage 相关行 ==="
        grep -n "recoveryimage" "$CORE_MAKEFILE" || echo "(未在 Makefile 中找到)"

        echo "=== 搜索 Makefile 中 BUILDING_RECOVERY_IMAGE 相关行 ==="
        grep -n "BUILDING_RECOVERY_IMAGE" "$CORE_MAKEFILE" || echo "(未在 Makefile 中找到)"

        echo "=== 搜索 Makefile 中 PRODUCT_BUILD_RECOVERY 相关行 ==="
        grep -n "PRODUCT_BUILD_RECOVERY" "$CORE_MAKEFILE" || echo "(未在 Makefile 中找到)"

        # 🔥 第二步：找到 recoveryimage phony target 的实际定义位置
        # 它可能在 Makefile 中通过 ifeq 条件动态生成
        echo "=== recoveryimage 定义上下文 (前后80行) ==="
        REC_DEF_LINE=$(grep -n "^recoveryimage:" "$CORE_MAKEFILE" 2>/dev/null | head -1 | cut -d: -f1 || true)
        if [ -z "$REC_DEF_LINE" ]; then
          # 可能是通过 eval 或变量间接定义的，搜索更宽泛的模式
          REC_DEF_LINE=$(grep -n "recoveryimage" "$CORE_MAKEFILE" 2>/dev/null | grep -v "nodeps\|#\|dont_bother" | head -1 | cut -d: -f1 || true)
        fi

        if [ -n "$REC_DEF_LINE" ]; then
          START=$((REC_DEF_LINE > 80 ? REC_DEF_LINE - 80 : 1))
          END=$((REC_DEF_LINE + 30))
          sed -n "${START},${END}p" "$CORE_MAKEFILE"
        else
          echo "(未在 Makefile 中找到 recoveryimage 定义)"
          echo "=== 搜索整个 build/make/ 目录 ==="
          grep -rn "^recoveryimage:" build/make/ 2>/dev/null | head -5
          grep -rn "recoveryimage" build/make/core/tasks/ 2>/dev/null | head -10
        fi

        # 🔥 第三步：暴力 patch —— 直接在 Makefile 末尾追加 recoveryimage 目标
        # 这是最后手段：如果构建系统不自动注册，我们就手动注册
        echo "🔧 强制追加 recoveryimage 目标到 $CORE_MAKEFILE"
        cat >> "$CORE_MAKEFILE" << 'MAKEPATCH'

        # === TWRP FORCE RECOVERY TARGET ===
        BUILDING_RECOVERY_IMAGE := true
        RECOVERY_VARIANT := twrp
        .PHONY: recoveryimage
        recoveryimage: $(PRODUCT_OUT)/recovery.img
        	@echo "TWRP: recoveryimage target invoked"
        
        ifneq ($(wildcard bootable/recovery/Android.mk),)
        include bootable/recovery/Android.mk
        endif
        # === END TWRP FORCE ===
        MAKEPATCH
        echo "✅ Patch appended"
        tail -15 "$CORE_MAKEFILE"

        # 同时确保 config.mk 也有变量（双重保险）
        CORE_CONFIG="build/make/core/config.mk"
        [ ! -f "$CORE_CONFIG" ] && CORE_CONFIG="build/core/config.mk"
        if ! grep -q "^# TWRP_FORCE_RECOVERY" "$CORE_CONFIG"; then
          sed -i '1i\# TWRP_FORCE_RECOVERY\nBUILDING_RECOVERY_IMAGE := true\nRECOVERY_VARIANT := twrp\n' "$CORE_CONFIG"
        fi

        # 生成设备树
        DEVICE_PATH="device/teclast/m20_mt6797"
        mkdir -p "$DEVICE_PATH/recovery/root/etc"
        [ ! -f "../boot.img" ] && { echo "❌ 缺少 boot.img"; exit 1; }
        cp ../boot.img "$DEVICE_PATH/prebuilt_boot.img"

        cat > "$DEVICE_PATH/AndroidProducts.mk" << 'EOF'
        PRODUCT_MAKEFILES := $(LOCAL_DIR)/twrp_m20_mt6797.mk
        EOF

        cat > "$DEVICE_PATH/twrp_m20_mt6797.mk" << 'EOF'
        $(call inherit-product, vendor/omni/config/common.mk)
        PRODUCT_DEVICE := m20_mt6797
        PRODUCT_NAME := twrp_m20_mt6797
        PRODUCT_BRAND := Teclast
        PRODUCT_MODEL := Teclast M20 4G
        PRODUCT_MANUFACTURER := Teclast
        ALLOW_MISSING_DEPENDENCIES := true
        PRODUCT_COPY_FILES += \
            $(LOCAL_PATH)/recovery/root/etc/recovery.fstab:recovery/root/etc/recovery.fstab
        EOF

        cat > "$DEVICE_PATH/BoardConfig.mk" << 'EOF'
        DEVICE_PATH := device/teclast/m20_mt6797
        TARGET_PREBUILT_KERNEL := $(DEVICE_PATH)/prebuilt_boot.img
        TARGET_NO_KERNEL := true
        TARGET_ARCH := arm64
        TARGET_ARCH_VARIANT := armv8-a
        TARGET_CPU_ABI := arm64-v8a
        TARGET_2ND_ARCH := arm
        TARGET_2ND_ARCH_VARIANT := armv7-a-neon
        TARGET_2ND_CPU_ABI := armeabi-v7a
        TARGET_BOARD_PLATFORM := mt6797
        TARGET_BOOTLOADER_BOARD_NAME := mt6797
        TARGET_NO_BOOTLOADER := true
        BOARD_KERNEL_CMDLINE := bootopt=64S3,32N2,64N2 buildvariant=eng
        BOARD_KERNEL_BASE := 0x40078000
        BOARD_KERNEL_PAGESIZE := 2048
        BOARD_KERNEL_OFFSET := 0x00008000
        BOARD_RAMDISK_OFFSET := 0x11a88000
        BOARD_KERNEL_TAGS_OFFSET := 0x07808000
        BOARD_MKBOOTIMG_ARGS := --kernel_offset $(BOARD_KERNEL_OFFSET) --ramdisk_offset $(BOARD_RAMDISK_OFFSET) --tags_offset $(BOARD_KERNEL_TAGS_OFFSET)
        LZMA_RAMDISK_TARGETS := recovery
        BOARD_USE_LZMA_COMPRESSION := true
        WITH_DEXPREOPT := false
        TW_THEME := landscape_hdpi
        TARGET_SCREEN_WIDTH := 2560
        TARGET_SCREEN_HEIGHT := 1600
        TW_BRIGHTNESS_PATH := "/sys/class/leds/lcd-backlight/brightness"
        TW_MAX_BRIGHTNESS := 255
        TW_DEFAULT_BRIGHTNESS := 120
        RECOVERY_SDCARD_ON_DATA := true
        TARGET_RECOVERY_PIXEL_FORMAT := "RGBX_8888"
        BOARD_FLASH_BLOCK_SIZE := 131072
        BOARD_BOOTIMAGE_PARTITION_SIZE := 33554432
        BOARD_RECOVERYIMAGE_PARTITION_SIZE := 16777216
        BOARD_HAS_LARGE_FILESYSTEM := true
        TW_EXCLUDE_ADB := true
        TW_EXCLUDE_TWRPAPP := true
        TW_EXCLUDE_NANO := true
        TW_EXCLUDE_BASH := true
        TW_EXCLUDE_PYTHON := true
        TW_EXCLUDE_MTP := true
        TW_EXCLUDE_SUPERSU := true
        TW_EXCLUDE_CRYPTO := true
        TW_EXCLUDE_ENCRYPTED_BACKUPS := true
        TW_EXCLUDE_HAPTICS := true
        TW_NO_SCREEN_TIMEOUT := true
        TW_NO_BATT_PERCENT := true
        TW_NO_CPU_TEMP := true
        TW_USE_MINIMAL_BUSYBOX := true
        TW_USE_TOOLBOX := true
        EOF

        cat > "$DEVICE_PATH/recovery/root/etc/recovery.fstab" << 'EOF'
        /boot emmc /dev/block/by-name/boot flags=backup=1
        /recovery emmc /dev/block/by-name/recovery flags=backup=1
        /system ext4 /dev/block/by-name/system flags=backup=8
        /vendor ext4 /dev/block/by-name/vendor flags=backup=8
        /data f2fs /dev/block/by-name/userdata flags=backup=1,encryptable=footer
        /cache ext4 /dev/block/by-name/cache flags=backup=8
        /sdcard vfat /dev/block/mmcblk1p1 flags=display="Micro SDcard";storage;wipeingui;removable
        /usb-otg auto /dev/block/sda1 flags=display="USB-OTG";storage;wipeingui;removable
        EOF

        source build/envsetup.sh
        lunch twrp_m20_mt6797-eng > >(tee /tmp/lunch_output.txt) 2>&1
        sleep 1

        [ "$TARGET_PRODUCT" != "twrp_m20_mt6797" ] || [ -z "$OUT" ] && { echo "❌ lunch 失败"; cat /tmp/lunch_output.txt; exit 1; }

        echo "=== 验证 BUILDING_RECOVERY_IMAGE ==="
        make -qp 2>/dev/null | grep "BUILDING_RECOVERY_IMAGE" || echo "(仍未设置!)"

        echo "=== 验证 recoveryimage 目标 ==="
        make -n recoveryimage 2>&1 | head -20

        if ! make -n recoveryimage >/dev/null 2>&1; then
          echo "❌ recoveryimage 仍未注册！"
          echo "=== Makefile 末尾 patch 内容 ==="
          tail -20 "$CORE_MAKEFILE"
          echo "=== make -qp 中所有含 image 的目标 ==="
          make -qp 2>/dev/null | grep -E "^[a-z]+image:" | sort -u | head -20
          exit 1
        fi

        echo "✅ recoveryimage 已注册"
        export LZMA_RAMDISK_TARGETS=recovery BOARD_USE_LZMA_COMPRESSION=true
        make -j$(nproc) recoveryimage SHOW_COMMANDS=1

        RECOVERY_IMG="$OUT/recovery.img"
        [ ! -f "$RECOVERY_IMG" ] && { echo "❌ recovery.img 未生成"; ls -laR "$OUT/" | head -100; exit 1; }
        SIZE=$(stat -c%s "$RECOVERY_IMG")
        echo "📊 recovery.img: $SIZE bytes ($((SIZE/1024/1024)) MB)"
        [ $SIZE -gt 16777216 ] && { echo "❌ 超过 16MB"; exit 1; }
        echo "✅ 构建成功！"

    - name: Upload TWRP Recovery Image
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Recovery-m20_mt6797
        path: twrp_build/out/target/product/m20_mt6797/recovery.img
        if-no-files-found: error
